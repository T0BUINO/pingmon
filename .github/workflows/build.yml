name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}${{ matrix.goarm && format('/v{0}', matrix.goarm) || '' }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: "386"
            suffix: linux-386
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "6"
            suffix: linux-armv6
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: linux
            goarch: riscv64
            suffix: linux-riscv64
          - goos: linux
            goarch: loong64
            suffix: linux-loong64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: windows
            goarch: "386"
            suffix: windows-386
            ext: .exe
          - goos: windows
            goarch: arm64
            suffix: windows-arm64
            ext: .exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: freebsd
            goarch: amd64
            suffix: freebsd-amd64
          - goos: freebsd
            goarch: arm64
            suffix: freebsd-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          set -euo pipefail
          mkdir -p dist/${{ matrix.suffix }}
          go build -trimpath -buildvcs=false -ldflags="-s -w" -o dist/${{ matrix.suffix }}/supervisor${{ matrix.ext }} ./cmd/supervisor
          go build -trimpath -buildvcs=false -ldflags="-s -w" -o dist/${{ matrix.suffix }}/agent${{ matrix.ext }} ./cmd/agent
          cp README.md dist/${{ matrix.suffix }}/
          cp -r configs dist/${{ matrix.suffix }}/

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          tar -czf pingmon-${{ matrix.suffix }}.tar.gz ${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pingmon-${{ matrix.suffix }}
          path: dist/pingmon-${{ matrix.suffix }}.tar.gz
          if-no-files-found: error
          retention-days: 14
